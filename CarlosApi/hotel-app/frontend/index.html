<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Hotel</title>

<style>
body {
  background: linear-gradient(135deg, #000000, #1a1a1a);
  color: gold;
  font-family: Arial;
  text-align: center;
}

/* TITULOS */
h1 {
  font-size: 40px;
  text-shadow: 0 0 15px gold;
}

/* INPUTS */
input {
  padding: 10px;
  margin: 5px;
  border-radius: 5px;
  border: none;
  transition: 0.3s;
}

input:focus {
  outline: none;
  box-shadow: 0 0 10px gold;
}

/* BOTONES */
button {
  padding: 10px 15px;
  margin: 5px;
  cursor: pointer;
  background: gold;
  color: black;
  border: none;
  border-radius: 5px;
  transition: all 0.3s ease;
}

button:hover {
  transform: scale(1.1);
  box-shadow: 0 0 15px gold;
}

/* HABITACIONES */
.habitacion {
  display: inline-block;
  margin: 6px;
  padding: 15px;
  border: 2px solid gold;
  cursor: pointer;
  border-radius: 10px;
  transition: all 0.3s ease;
}

/* EFECTO HOVER PRO */
.habitacion:hover {
  transform: scale(1.2) translateY(-5px);
  box-shadow: 0 0 15px gold, 0 0 25px gold;
}

/* EFECTO CLICK */
.habitacion:active {
  transform: scale(0.95);
}

/* ESTADOS (NO TOCAR COLORES) */
.disponible { background: transparent; }
.reservada { background: orange; color: black; }
.ocupada { background: red; color: white; }

/* SELECCION */
.seleccionada {
  outline: 3px solid lime;
  box-shadow: 0 0 15px lime;
}

/* TABLAS */
table {
  width: 90%;
  margin: auto;
  border-collapse: collapse;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
}

/* ENCABEZADO */
th {
  background: gold;
  color: black;
  padding: 12px;
  font-weight: bold;
}

/* CELDAS */
td {
  border-bottom: 1px solid gold;
  padding: 10px;
  transition: 0.3s;
}

/* FILAS DINÁMICAS */
tr:hover td {
  background: rgba(255, 215, 0, 0.2);
  transform: scale(1.01);
}

/* EFECTO ZEBRA */
tr:nth-child(even) {
  background: rgba(255, 215, 0, 0.05);
}

/* SEPARADOR */
hr {
  border: 1px solid gold;
  margin: 30px;
}
</style>
</head>

<body>

<h1>🤣 HOTEL EL BÁRBARO 🤣</h1>

<h2>Registrar Cliente</h2>
<input id="id" placeholder="ID">
<input id="nombre" placeholder="Nombre">
<input id="apellido" placeholder="Apellido">
<input id="celular" placeholder="Celular">
<br>
<button onclick="guardarCliente()">Guardar Cliente</button>

<hr>

<h2>Habitaciones del bárbaro</h2>
<div id="habitaciones"></div>

<h3 id="info"></h3>

<h2>Reservar en el bárbaro</h2>
<input id="idcliente" placeholder="ID Cliente">
<input type="date" id="entrada">
<input type="date" id="salida">
<br>
<button onclick="reservar()">Reservar</button>

<hr>

<h2>Clientes del bárbaro</h2>

<table>
<thead>
<tr>
<th>ID</th>
<th>Nombre</th>
<th>Apellido</th>
<th>Celular</th>
<th>Habitación</th>
<th>Tipo</th>
<th>Acción</th>
</tr>
</thead>
<tbody id="tablaClientes"></tbody>
</table>

<hr>

<h2>Reservas en el bárbaro</h2>

<table>
<thead>
<tr>
<th>ID Cliente</th>
<th>Habitación</th>
<th>Tipo</th>
<th>Precio</th>
<th>Entrada</th>
<th>Salida</th>
<th>Acción</th>
</tr>
</thead>
<tbody id="tablaReservas"></tbody>
</table>

<script>



let habitacion = null;
let tipo = "";
let precio = 0;

let habitacionesDOM = {};
let clientesGlobal = [];
let reservasGlobal = [];

for(let i=1;i<=50;i++){
  let div = document.createElement("div");
  div.className = "habitacion disponible";
  div.innerText = i;

  habitacionesDOM[i] = div;

  div.onclick = () => {
    document.querySelectorAll(".habitacion").forEach(x=>x.classList.remove("seleccionada"));
    div.classList.add("seleccionada");

    habitacion = i;

    if(i<=10){
      tipo="Premium"; precio=1000000;
    } else if(i<=30){
      tipo="Administrativa"; precio=700000;
    } else {
      tipo="Normal"; precio=400000;
    }

    document.getElementById("info").innerText =
      "Habitación " + i + " | Tipo: " + tipo + " | Precio: $" + precio;
  };

  document.getElementById("habitaciones").appendChild(div);
}

function actualizarEstadoHabitaciones(clientes, reservas){

  for(let i=1;i<=50;i++){
    habitacionesDOM[i].classList.remove("reservada","ocupada");
    habitacionesDOM[i].classList.add("disponible");
  }

  clientes.forEach(c=>{
    if(c.habitacion){
      let num = Number(c.habitacion);
      habitacionesDOM[num].classList.remove("disponible");
      habitacionesDOM[num].classList.add("ocupada");
    }
  });

  reservas.forEach(r=>{
    let num = Number(r.numero);

    if(!habitacionesDOM[num].classList.contains("ocupada")){
      habitacionesDOM[num].classList.remove("disponible");
      habitacionesDOM[num].classList.add("reservada");
    }
  });
}

function guardarCliente(){
  let cliente = {
    idcliente: document.getElementById("id").value,
    nombre: document.getElementById("nombre").value,
    apellido: document.getElementById("apellido").value,
    celular: document.getElementById("celular").value,
    habitacion: habitacion,
    tipo: tipo
  };

  if(!cliente.idcliente || !cliente.nombre || !cliente.apellido || !cliente.celular){
    alert("Completa todos los datos");
    return;
  }

  if(!habitacion){
    alert("Debes seleccionar una habitación");
    return;
  }

  fetch("/api/clientes",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify(cliente)
  })
  .then(res=>res.json())
  .then(res=>{
    alert(res.mensaje || res.error);
    cargarClientes();
  });
}

function cargarClientes(){
  fetch("/api/clientes")
  .then(res => res.json())
  .then(data => {

    clientesGlobal = data;

    let tabla = document.getElementById("tablaClientes");
    tabla.innerHTML="";

    data.forEach(c=>{
      tabla.innerHTML+=`
        <tr>
          <td>${c.idcliente}</td>
          <td>${c.nombre}</td>
          <td>${c.apellido}</td>
          <td>${c.celular}</td>
          <td>${c.habitacion || "-"}</td>
          <td>${c.tipo || "-"}</td>
          <td><button onclick="eliminarCliente(${c.idcliente})">Eliminar</button></td>
        </tr>`;
    });

    actualizarEstadoHabitaciones(clientesGlobal, reservasGlobal);
  });
}

function eliminarCliente(id){
  if(!confirm("¿Eliminar cliente?")) return;

  fetch("/api/clientes/" + id, { method: "DELETE" })
  .then(res => res.json())
  .then(res => {
    alert(res.mensaje);
    cargarClientes();
  });
}

function reservar(){
  let data = {
    idcliente: document.getElementById("idcliente").value,
    numero: habitacion,
    tipo: tipo,
    precio: precio,
    fecha_entrada: document.getElementById("entrada").value,
    fecha_salida: document.getElementById("salida").value
  };

  if(!data.idcliente || !data.numero || !data.fecha_entrada || !data.fecha_salida){
    alert("Completa todos los campos");
    return;
  }

  fetch("/api/reservas",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify(data)
  })
  .then(res=>res.json())
  .then(res=>{
    alert(res.mensaje);
    cargarReservas();
  });
}

function cargarReservas(){
  fetch("/api/reservas")
  .then(res=>res.json())
  .then(data=>{

    reservasGlobal = data;

    let tabla=document.getElementById("tablaReservas");
    tabla.innerHTML="";

    data.forEach(r=>{
      tabla.innerHTML+=`
      <tr>
        <td>${r.idcliente}</td>
        <td>${r.numero}</td>
        <td>${r.tipo}</td>
        <td>$${r.precio}</td>
        <td>${r.fecha_entrada}</td>
        <td>${r.fecha_salida}</td>
        <td><button onclick="eliminar(${r.idreserva})">Eliminar</button></td>
      </tr>`;
    });

    actualizarEstadoHabitaciones(clientesGlobal, reservasGlobal);
  });
}

function eliminar(id){
  fetch("/api/reservas/"+id,{method:"DELETE"})
  .then(res=>res.json())
  .then(res=>{
    alert(res.mensaje);
    cargarReservas();
  });
}

cargarClientes();
cargarReservas();

</script>

</body>
</html>
